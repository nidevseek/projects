<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Страница в разработке</title>
    <style>
        body {
            font-family: "Montserrat", serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111111;
            font-family: Arial, sans-serif;
            color: #ffffff;
            text-align: center;
        }

        .content {
            max-width: 600px;
        }

        .icon {
            margin-bottom: 20px;
            animation: glow 1.5s infinite alternate;
            display: inline-block;
        }

        .icon img {
            width: 100px;
            height: 100px;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 10px #ffeb78) drop-shadow(0 0 20px #ffd900);
            }
            to {
                filter: drop-shadow(0 0 20px #ffef93) drop-shadow(0 0 40px #ffd900);
            }
        }

        h1 {
            font-family: "Montserrat", serif;
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            font-family: "Montserrat", serif;
            color: #767676;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="icon">
            <img width="82" height="82" src="sparkles.svg">
        </div>
        <h1>Page Development</h1>
        <p>Some features of this page are not ready or are currently limited. Once they become available, we will notify you through updates or other means!</p>
    </div>
</body>
</html>
